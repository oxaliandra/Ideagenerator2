<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050509">
    <meta name="background-color" content="#050509">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tattoo Ideen">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>Täglicher Tattoo Design Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #111827 0%, #02040a 55%, #000000 100%);
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(3, 7, 18, 0.96);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(248, 113, 113, 0.45);
        }

        h1 {
            text-align: center;
            color: #f87171;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 0 18px rgba(248, 113, 113, 0.6);
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .date-display {
            text-align: center;
            color: #facc15;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .design-card {
            background: linear-gradient(135deg, rgba(127, 29, 29, 0.18) 0%, rgba(15, 23, 42, 0.85) 100%);
            border: 1px solid rgba(248, 113, 113, 0.45);
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .design-title {
            font-size: 1.5rem;
            color: #fca5a5;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .theme-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(127, 29, 29, 0.55);
            border: 1px solid rgba(248, 113, 113, 0.9);
            color: #fee2e2;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tag.primary {
            background: rgba(220, 38, 38, 0.9);
            border-color: rgba(254, 202, 202, 0.9);
        }

        .design-description {
            color: #d1d5db;
            line-height: 1.8;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .design-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(248, 113, 113, 0.35);
        }

        .meta-item {
            font-size: 0.9rem;
        }

        .meta-label {
            color: #9ca3af;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-value {
            color: #fca5a5;
            font-weight: bold;
            margin-top: 3px;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(185, 28, 28, 0.6);
        }

        .btn-secondary {
            background: rgba(15, 23, 42, 0.9);
            color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.6);
        }

        .btn-secondary:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(248, 113, 113, 0.95);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .info-box {
            background: rgba(22, 163, 74, 0.08);
            border-left: 4px solid #22c55e;
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #bbf7d0;
        }

        .themes {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .theme-item {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #9ca3af;
            transition: all 0.3s ease;
        }

        .theme-item.active {
            background: rgba(127, 29, 29, 0.8);
            color: #fecaca;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .buttons-container {
                grid-template-columns: 1fr;
            }

            .design-meta {
                grid-template-columns: 1fr;
            }

            .themes {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Täglicher Tattoo Design Generator</h1>
        <p class="subtitle">Tägliche Inspiration für deine nächsten Tattoo-Arbeiten</p>

        <div class="date-display" id="dateDisplay"></div>

        <div class="design-card">
            <div>
                <div class="design-title" id="designTitle">Lade Design...</div>

                <div class="themes" id="themesList"></div>

                <div class="theme-tags" id="themeTags"></div>

                <div class="design-description" id="designDescription"></div>

                <div class="design-meta">
                    <div class="meta-item">
                        <div class="meta-label">Größe</div>
                        <div class="meta-value" id="sizeInfo"></div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Platzierung</div>
                        <div class="meta-value" id="placementInfo"></div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Komplexität</div>
                        <div class="meta-value" id="complexityInfo"></div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Stil</div>
                        <div class="meta-value" id="styleInfo"></div>
                    </div>
                </div>

                <div class="info-box">
                    💡 <strong>Tipp:</strong> <span id="tipText"></span>
                </div>
            </div>
        </div>

        <div class="buttons-container">
            <button class="btn btn-secondary" onclick="previousDay()">← Gestern</button>
            <button class="btn btn-secondary" onclick="nextDay()">Morgen →</button>
            <button class="btn btn-primary" onclick="generateNewIdea()">🎲 Neue Idee (Heute)</button>
        </div>
    </div>

    <script>
        const themes = ['Keltisch', 'Irland', 'Floral', 'Fantasy', 'Realism'];

        const designs = [
            {
                title: 'Keltischer Knoten mit Kleeblatt',
                description: 'Ein komplexes keltisches Knotenmuster, das sich um ein stilisiertes vierblättriges Kleeblatt windet. Die verschlungenen Linien bilden unendliche Muster, die die irische Kultur repräsentieren. Perfekt für Symbol und kulturelle Verbindung.',
                themeIndices: [0, 1, 2],
                size: '5-8 cm',
                placement: 'Oberarm, Oberschenkel',
                complexity: 'Mittel bis Hoch',
                style: 'Line Work',
                tip: 'Dieses Design funktioniert besonders gut mit schwarzer Tinte und feinen Linien. Achte auf symmetrische Proportionen für maximale Wirkung.'
            },
            {
                title: 'Fantasie-Drache mit keltischen Elementen',
                description: 'Ein majestätischer Drache mit fließenden Bewegungen, kombiniert mit keltischen Mustern an Flügeln und Körper. Wirkt mystisch und kraftvoll, mit detaillierten Schuppen im realistischen Stil.',
                themeIndices: [0, 3, 4],
                size: '10-15 cm',
                placement: 'Rücken, Brust, Oberschenkel',
                complexity: 'Hoch',
                style: 'Mix aus Realism & Line Art',
                tip: 'Ein größeres Design für maximale Details. Achte auf die Schattierung der Drache-Schuppen für Tiefenwirkung.'
            },
            {
                title: 'Blumenkrone aus irischen Wildblumen',
                description: 'Eine zarte Krone aus Wildblumen wie Hasenglöckchen, Kleeblüten und Efeu, angeordnet in einem Kreis. Botanisch detailliert mit minimalistischen Linien. Romantisch und elfisch.',
                themeIndices: [1, 2, 3],
                size: '6-10 cm',
                placement: 'Unterarm, Fußgelenk, Oberschenkel',
                complexity: 'Mittel',
                style: 'Botanisch Realistisch',
                tip: 'Wähle subtile Grautöne für die Blüten. Dieses Design eignet sich wunderbar für kleinere Platzierungen und ist zeitlos schön.'
            },
            {
                title: 'Mythologischer Phönix mit Flammen',
                description: 'Ein aufsteigender Phönix aus Flammen mit feuerrotem und orangenem Farbverlauf. Kombiniert Fantasy-Ästhetik mit realistischen Feder-Details. Symbol für Wiedergeburt und Stärke.',
                themeIndices: [3, 4],
                size: '12-18 cm',
                placement: 'Rücken, Brust, Wade',
                complexity: 'Hoch',
                style: 'Realism mit Farbe',
                tip: 'Perfekt für Farbwerk! Der Phönix wirkt am besten mit warmen Farben und guter Schattierung. Plane genug Platz für Details.'
            },
            {
                title: 'Minimalistisches Kleeblatt in keltischer Spirale',
                description: 'Ein einfaches Kleeblatt, dessen Blätter aus keltischen Spiralen bestehen. Stark symbolisch, minimalistisch und elegant. Perfekt für erste Tattoos oder kleinere Platzierungen.',
                themeIndices: [0, 1],
                size: '2-4 cm',
                placement: 'Handgelenk, Fußgelenk, Hinter dem Ohr',
                complexity: 'Niedrig',
                style: 'Line Work',
                tip: 'Weniger ist mehr! Achte auf saubere, dünne Linien. Ein klassisches Design, das zeitlos bleibt.'
            },
            {
                title: 'Waldlandschaft mit keltischen Runen',
                description: 'Eine Silhouette eines irischen Waldes mit alten Bäumen, unten Keltische Runen oder Ogham-Schrift. Realistisch und mystisch. Verbindung zur Natur und Geschichte.',
                themeIndices: [0, 1, 4],
                size: '8-12 cm',
                placement: 'Oberarm, Unterschenkel, Rippen',
                complexity: 'Mittel bis Hoch',
                style: 'Schwarzer Realism',
                tip: 'Versuche, unterschiedliche Baumsilhouetten zu schaffen für Tiefe. Die Runen können personalisiert werden.'
            },
            {
                title: 'Magische Feder mit Flora und Vogelsilhouetten',
                description: 'Eine große Feder, aus der kleine Vögel und Blüten in Silhouetten ausfliegen. Fantasy-Ästhetik mit botanischen Elementen. Symbolisiert Freiheit und Wachstum.',
                themeIndices: [2, 3, 4],
                size: '9-14 cm',
                placement: 'Oberarm, Oberschenkel, Wade',
                complexity: 'Mittel',
                style: 'Silhouette & Linework',
                tip: 'Großartig für minimale Farbe oder Grayscale. Die Komposition schafft natürliche Bewegung und Fluss.'
            },
            {
                title: 'Heraldisches irisches Wappen mit keltischem Rahmen',
                description: 'Ein traditionelles irisches Symbol (Harfe, Kleeblatt oder Krone) eingefasst in komplex gemusterte keltische Rahmenmotive. Klassisch und würdevoll.',
                themeIndices: [0, 1],
                size: '7-11 cm',
                placement: 'Oberarm, Brust, Oberschenkel',
                complexity: 'Mittel bis Hoch',
                style: 'Traditionell Black Work',
                tip: 'Ein zeitloses Design für kulturelle Verbundenheit. Achte auf symmetrischen Aufbau für maximale Wirkung.'
            },
            {
                title: 'Mystische Mondsichel mit Blüten und Sternen',
                description: 'Eine Mondsichel, verziert mit verschiedenen Blüten und winzigen Sternen. Fantasy-Ästhetik mit floralem Twist. Weiblich und magisch.',
                themeIndices: [2, 3],
                size: '5-9 cm',
                placement: 'Handgelenk, Fußgelenk, Hals',
                complexity: 'Niedrig bis Mittel',
                style: 'Fine Line & Dot Work',
                tip: 'Perfekt für zarte Placements. Nutze kleine Punkte für Sterne und feine Linien für Blüten.'
            },
            {
                title: 'Realistische Wolfsmaske mit keltischem Muster',
                description: 'Ein Wolf im realistischen Stil mit durchsichtig wirkenden keltischen Mustern, die durch das Fell scheinen. Kraftvoll und mystisch.',
                themeIndices: [0, 3, 4],
                size: '10-16 cm',
                placement: 'Rücken, Brust, Oberschenkel',
                complexity: 'Hoch',
                style: 'Realism mit Geometric',
                tip: 'Ein anspruchsvolles Design. Verwende hohe Kontraste für die realistischen Augen und das Fell.'
            },
            {
                title: 'Bonsai-Baum mit keltischem Wurzelmuster',
                description: 'Ein stilisierter Bonsai-Baum mit feinen Blättern, die Wurzeln bilden keltische Muster. Balance zwischen Ost und West Ästhetik.',
                themeIndices: [0, 2, 3],
                size: '6-10 cm',
                placement: 'Oberarm, Wade, Unterschenkel',
                complexity: 'Mittel',
                style: 'Botanisch & Geometric',
                tip: 'Ein einzigartiges Fusion-Design. Achte auf die Balance zwischen Baum und Wurzelmuster.'
            }
        ];

        const placements = [
            'Handgelenk',
            'Fußgelenk', 
            'Oberarm',
            'Unterarm',
            'Oberschenkel',
            'Wade',
            'Rücken',
            'Brust',
            'Nacken',
            'Hinter dem Ohr',
            'Unterschenkel',
            'Rippen'
        ];

        let currentDate = new Date();

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        function getDesignForDate(date) {
            const dateStr = date.toISOString().split('T')[0];
            const hash = hashCode(dateStr);
            const designIndex = hash % designs.length;
            return designs[designIndex];
        }

        function getPlacementForDate(date) {
            const dateStr = date.toISOString().split('T')[0];
            const hash = hashCode(dateStr + 'placement');
            return placements[hash % placements.length];
        }

        function displayDesign(date) {
            const design = getDesignForDate(date);
            const placement = getPlacementForDate(date);

            document.getElementById('dateDisplay').textContent = 
                '📅 ' + date.toLocaleDateString('de-DE', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

            document.getElementById('designTitle').textContent = design.title;
            document.getElementById('designDescription').textContent = design.description;
            document.getElementById('sizeInfo').textContent = design.size;
            document.getElementById('placementInfo').textContent = placement;
            document.getElementById('complexityInfo').textContent = design.complexity;
            document.getElementById('styleInfo').textContent = design.style;
            document.getElementById('tipText').textContent = design.tip;

            const themesList = document.getElementById('themesList');
            themesList.innerHTML = '';
            themes.forEach((theme, index) => {
                const themeItem = document.createElement('div');
                themeItem.className = 'theme-item' + (design.themeIndices.includes(index) ? ' active' : '');
                themeItem.textContent = theme;
                themesList.appendChild(themeItem);
            });

            const themeTags = document.getElementById('themeTags');
            themeTags.innerHTML = '';
            design.themeIndices.forEach((index, position) => {
                const tag = document.createElement('span');
                tag.className = 'tag' + (position === 0 ? ' primary' : '');
                tag.textContent = themes[index];
                themeTags.appendChild(tag);
            });
        }

        function previousDay() {
            currentDate.setDate(currentDate.getDate() - 1);
            displayDesign(currentDate);
        }

        function nextDay() {
            currentDate.setDate(currentDate.getDate() + 1);
            displayDesign(currentDate);
        }

        function generateNewIdea() {
            currentDate = new Date();
            displayDesign(currentDate);
        }

        displayDesign(currentDate);
    </script>
</body>
</html>
